name: Feature Request
description: Suggest a new feature or improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for your suggestion! We'd love to hear your ideas.

  - type: textarea
    id: description
    attributes:
      label: What would you like?
      description: Describe the feature you'd like to see
      placeholder: "I'd like to be able to..."
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Why is this useful?
      description: How would this help your workflow?
      placeholder: "This would help because..."

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Have you considered any workarounds?
